<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>샘플 01 — 기본 콘텐츠</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        line-height: 1.6;
        max-width: 720px;
        margin: 40px auto;
        padding: 0 24px;
        color: #1f2937;
        background: #fafafa;
      }
      h1 { color: #2563eb; border-bottom: 2px solid #2563eb; padding-bottom: 8px; }
      h2 { color: #1e40af; margin-top: 32px; }
      .badge {
        display: inline-block;
        padding: 2px 10px;
        background: #dbeafe;
        color: #1e40af;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 600;
      }
      blockquote {
        border-left: 4px solid #2563eb;
        margin: 16px 0;
        padding: 8px 16px;
        background: #eff6ff;
        color: #1e3a8a;
      }
    </style>
  </head>
  <body>
    <span class="badge">SAMPLE 01</span>
    <h1>기본 콘텐츠 렌더링</h1>
    <p>이 페이지는 <strong>HtmlFileViewer</strong>가 단일 HTML 문서를 올바르게 그리는지 확인하는 가장 단순한 샘플입니다.</p>

    <h2>확인 포인트</h2>
    <ul>
      <li>제목과 본문이 깔끔히 보이는가</li>
      <li>인라인 스타일(<code>&lt;style&gt;</code>)이 적용되는가</li>
      <li>한글 폰트가 시스템 기본으로 정상 표시되는가</li>
    </ul>

    <blockquote>
      asset 프로토콜이 정상 동작하면 이 인용구는 파란 좌측 막대와 함께 표시됩니다.
    </blockquote>
  </body>
</html>
